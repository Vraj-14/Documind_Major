<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documind</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icons/analysis.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<header>
    <div class="header-center">
        <h1>Documind</h1>
        <div class="animated-tagline" id="animatedTagline">
            <span class="word" id="word0">Ask.</span>
            <span class="word" id="word1">Analyse.</span>
            <span class="word" id="word2">Unlock Insights.</span>
        </div>
    </div>
</header>

<div class="container">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>History</h3>
            <button class="sidebar-toggle" id="sidebarToggle" title="Hide sidebar">&#8249;</button>
        </div>
        <ul id="history"></ul>
    </aside>

    <button class="sidebar-open-tab" id="sidebarOpenTab" title="Show sidebar">&#8250;</button>

    <main>

        <section class="companies">
            <h3>Quick Company Insights</h3>
            <div class="company-grid">
                <button class="company-card">HDFC Bank Limited</button>
                <button class="company-card">ICICI Bank Limited</button>
                <button class="company-card">Infosys Limited</button>
                <button class="company-card">Reliance Industries Limited</button>
                <button class="company-card">Tata Consultancy Services Limited</button>
            </div>
        </section>

        <section class="question-box">
            <input
                type="text"
                id="questionInput"
                placeholder="Ask financial insights"
            >
            <button id="sendBtn">
                <img src="icons/up-arrow.png" alt="Send">
            </button>
        </section>

        <section class="answer">
            <h3>Response</h3>
            <div id="answerWindow"></div>
        </section>

        <!-- Chart section: bar (left) + pie (right) -->
        <section class="chart-section" id="chartSection" style="display:none;">
            <h3>Chart</h3>
            <div class="chart-row">
                <div class="chart-panel chart-panel--bar">
                    <span class="chart-panel-label">Bar Chart</span>
                    <div class="chart-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="chart-panel chart-panel--pie">
                    <span class="chart-panel-label">Pie Chart</span>
                    <div class="chart-wrapper">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <section class="entities">
    <div class="entity">
        <h4>Company</h4>
        <p id="company"></p>
    </div>
    <div class="entity">
        <h4>Metric</h4>
        <p id="metric"></p>
    </div>
    <div class="entity">
        <h4>Year</h4>
        <p id="year"></p>
    </div>
    <!-- NEW -->
    <div class="entity" id="intentCard">
        <h4>Predicted Intent</h4>
        <p id="predictedIntent"></p>
    </div>
    <div class="entity" id="finalIntentCard">
        <h4>Final Intent</h4>
        <p id="finalIntent"></p>
    </div>
    <div class="entity">
        <h4>Confidence</h4>
        <p id="confidenceScore"></p>
    </div>
</section>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

<script>
    /* ── TAGLINE ANIMATION ── */
    const words = document.querySelectorAll('.animated-tagline .word');
    const wordDelay    = 800;
    const holdDuration = 5000;
    const fadeOutMs    = 900;
    const pauseMs      = 2000;

    function runAnimation() {
        words.forEach(w => w.classList.remove('visible', 'fade-out'));
        words.forEach((w, i) => {
            setTimeout(() => w.classList.add('visible'), i * wordDelay);
        });
        const allInTime = (words.length - 1) * wordDelay + holdDuration;
        setTimeout(() => {
            words.forEach(w => {
                w.classList.remove('visible');
                w.classList.add('fade-out');
            });
            setTimeout(() => {
                words.forEach(w => w.classList.remove('fade-out'));
                setTimeout(runAnimation, pauseMs);
            }, fadeOutMs);
        }, allInTime);
    }
    runAnimation();

    /* ── SIDEBAR TOGGLE ── */
    const sidebar   = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const openTab   = document.getElementById('sidebarOpenTab');

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.add('collapsed');
        openTab.classList.add('visible');
    });

    openTab.addEventListener('click', () => {
        sidebar.classList.remove('collapsed');
        openTab.classList.remove('visible');
    });
</script>

</body>
</html>
